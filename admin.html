<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" />
<title>PNRP Sound Admin｜聲浪後台配置</title>
<script src="sounds-config.js"></script>
<style>
:root{--bg:#070912;--panel:rgba(18,22,38,.82);--line:rgba(255,255,255,.12);--text:#f3f6ff;--muted:#9aa7c7;--purple:#8b5cf6;--blue:#38bdf8;--orange:#f59e0b;--green:#22c55e;--red:#ef4444}*{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,Arial,"Noto Sans TC",sans-serif;background:linear-gradient(135deg,#050714,#0b1022);color:var(--text)}.wrap{max-width:1500px;margin:0 auto;padding:28px 18px 60px}.hero{border:1px solid var(--line);border-radius:26px;background:linear-gradient(135deg,rgba(139,92,246,.18),rgba(56,189,248,.08));padding:24px;margin-bottom:18px}.hero h1{margin:0 0 8px;font-size:34px}.hero p{margin:0;color:#c8d1ea;line-height:1.65}.bar{display:grid;grid-template-columns:1fr .7fr auto auto;gap:10px;margin:16px 0}.input,.select,button,textarea{font:inherit}.input,.select,textarea{width:100%;border:1px solid var(--line);background:rgba(10,14,27,.86);color:var(--text);border-radius:14px;padding:12px;outline:none}.btn{border:1px solid var(--line);background:rgba(255,255,255,.08);color:white;border-radius:14px;padding:12px 14px;cursor:pointer;font-weight:800}.btn.primary{background:linear-gradient(135deg,#8b5cf6,#38bdf8);border:0}.btn.green{background:linear-gradient(135deg,#16a34a,#22c55e);border:0}.btn.orange{background:linear-gradient(135deg,#f97316,#f59e0b);border:0}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.card{border:1px solid var(--line);background:rgba(255,255,255,.055);border-radius:20px;padding:16px}.top{display:flex;justify-content:space-between;gap:10px}.tag{font-size:12px;border-radius:999px;padding:5px 9px;border:1px solid var(--line);color:#cbd5e1}.tag.ready{color:#bbf7d0;border-color:rgba(34,197,94,.4);background:rgba(34,197,94,.12)}.tag.pending{color:#fde68a;border-color:rgba(245,158,11,.4);background:rgba(245,158,11,.12)}h3{font-size:17px;margin:10px 0 6px}.meta{color:#9fb0d8;font-size:12px;margin-bottom:10px}.row{display:grid;grid-template-columns:120px 1fr;gap:10px;align-items:center;margin:8px 0}.row label{font-size:12px;color:#aab6d3}.hint{font-size:12px;color:#8fa1c8;line-height:1.55;margin-top:6px}.footer{margin-top:18px;color:#9aa7c7;font-size:12px;line-height:1.6}.preview{color:#93c5fd;font-size:12px;text-decoration:none}.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:10;align-items:center;justify-content:center;padding:20px}.modal.show{display:flex}.box{width:min(1100px,96vw);background:#080b16;border:1px solid var(--line);border-radius:22px;padding:18px}.box textarea{height:55vh;font-family:ui-monospace,Menlo,monospace;font-size:12px}.close{float:right}.counter{color:#cbd5e1;font-size:13px}@media(max-width:980px){.grid{grid-template-columns:1fr}.bar{grid-template-columns:1fr}}
</style></head><body><main class="wrap"><section class="hero"><h1>PNRP 聲浪後台配置｜Sound URL Admin</h1><p>這是靜態 GitHub Pages 專用的「配置後台」。你可以在這裡填每個聲浪的精準 YouTube 影片連結，然後匯出新的 <b>sounds-config.js</b>，再上傳覆蓋 GitHub 倉庫原文件。注意：GitHub Pages 沒有資料庫，直接在後台按儲存只會暫存在你的瀏覽器。</p></section><section class="bar"><input id="q" class="input" placeholder="搜尋名稱 / hash / 分類"><select id="cat" class="select"><option value="">全部分類 / All Categories</option></select><button class="btn primary" onclick="exportConfig()">匯出 sounds-config.js</button><button class="btn green" onclick="saveLocal()">暫存本機</button></section><div class="counter" id="counter"></div><div id="grid" class="grid"></div><div class="footer">流程：1) 填入每個聲浪的「精準 YouTube URL」→ 2) 點「匯出 sounds-config.js」→ 3) 下載文件 → 4) 上傳到 GitHub 覆蓋舊的 sounds-config.js → 5) 網站自動更新。</div></main><div id="modal" class="modal"><div class="box"><button class="btn close" onclick="closeModal()">關閉</button><h3>複製或下載此配置</h3><textarea id="exportText"></textarea><div style="margin-top:10px;display:flex;gap:10px;flex-wrap:wrap"><button class="btn green" onclick="downloadConfig()">下載 sounds-config.js</button><button class="btn orange" onclick="copyConfig()">複製內容</button></div></div></div><script>
let sounds=JSON.parse(JSON.stringify(window.PNRP_SOUND_CONFIG||[]));const saved=localStorage.getItem('PNRP_SOUND_CONFIG_DRAFT');if(saved){try{sounds=JSON.parse(saved)}catch(e){}}
const q=document.getElementById('q'),cat=document.getElementById('cat'),grid=document.getElementById('grid');
const esc=s=>String(s??'').replace(/[&<>'"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[m]));
function ytId(url){if(!url)return null;const ps=[/youtube\.com\/watch\?v=([^&]+)/,/youtu\.be\/([^?&]+)/,/youtube\.com\/embed\/([^?&]+)/,/youtube\.com\/shorts\/([^?&]+)/];for(const p of ps){const m=String(url).match(p);if(m)return m[1];}return null;}
function initCats(){[...new Set(sounds.map(s=>s.category).filter(Boolean))].forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=c;cat.appendChild(o);});}
function update(idx,key,val){const i=sounds.findIndex(s=>s.no==idx);if(i>=0){sounds[i][key]=val;sounds[i].status=ytId(sounds[i].exactYoutubeUrl)?'ready':'pending';document.getElementById('status-'+idx).textContent=sounds[i].status==='ready'?'可播放 / Ready':'待放置 / Pending';document.getElementById('status-'+idx).className='tag '+sounds[i].status;}}
function render(){const term=q.value.trim().toLowerCase(),c=cat.value;const arr=sounds.filter(s=>(!c||s.category===c)&&(!term||[s.name,s.hash,s.category,s.info].join(' ').toLowerCase().includes(term)));document.getElementById('counter').textContent=`顯示 ${arr.length} / ${sounds.length}｜已配置 ${sounds.filter(s=>ytId(s.exactYoutubeUrl)).length}｜待放置 ${sounds.filter(s=>!ytId(s.exactYoutubeUrl)).length}`;grid.innerHTML=arr.map(s=>`<article class="card"><div class="top"><div><b>#${s.no}</b> ${esc(s.name)}</div><span id="status-${s.no}" class="tag ${ytId(s.exactYoutubeUrl)?'ready':'pending'}">${ytId(s.exactYoutubeUrl)?'可播放 / Ready':'待放置 / Pending'}</span></div><h3>${esc(s.hash)}</h3><div class="meta">${esc(s.category)}</div><div class="row"><label>精準 YouTube URL</label><input class="input" value="${esc(s.exactYoutubeUrl||'')}" oninput="update(${s.no},'exactYoutubeUrl',this.value)" placeholder="https://www.youtube.com/watch?v=... 或 https://youtu.be/..." /></div><div class="row"><label>Source / 5Mods</label><input class="input" value="${esc(s.sourceBackup||'')}" oninput="update(${s.no},'sourceBackup',this.value)" placeholder="原作者 / 5Mods 來源" /></div><div class="row"><label>YouTube 搜尋</label><input class="input" value="${esc(s.youtubeSearchUrl||'')}" oninput="update(${s.no},'youtubeSearchUrl',this.value)" /></div><div class="row"><label>備註</label><input class="input" value="${esc(s.adminNote||'')}" oninput="update(${s.no},'adminNote',this.value)" placeholder="例如：已測試 / 不準 / 待錄制" /></div><div class="hint">${ytId(s.exactYoutubeUrl)?`可播放影片 ID：${ytId(s.exactYoutubeUrl)}`:'請只放真正對應這個 audioNameHash 的影片，不確定就留空。'} ${s.sourceBackup?`<br><a class="preview" href="${esc(s.sourceBackup)}" target="_blank">打開 Source</a>`:''}</div></article>`).join('');}
function saveLocal(){localStorage.setItem('PNRP_SOUND_CONFIG_DRAFT',JSON.stringify(sounds));alert('已暫存在這台電腦的瀏覽器。要讓玩家看到，仍然要匯出 sounds-config.js 並上傳 GitHub。');}
function buildConfig(){return '// PNRP Engine Sound Preview Config\nwindow.PNRP_SOUND_CONFIG = '+JSON.stringify(sounds,null,2)+';\n';}
function exportConfig(){document.getElementById('exportText').value=buildConfig();document.getElementById('modal').classList.add('show');}
function closeModal(){document.getElementById('modal').classList.remove('show')}
function copyConfig(){navigator.clipboard.writeText(document.getElementById('exportText').value);alert('已複製。')}
function downloadConfig(){const blob=new Blob([buildConfig()],{type:'text/javascript;charset=utf-8'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='sounds-config.js';a.click();URL.revokeObjectURL(a.href)}
q.addEventListener('input',render);cat.addEventListener('change',render);initCats();render();
</script></body></html>
